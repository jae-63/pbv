    space_after: false

# ---------------------------------------------------------------------------
# Multiprocessing
# ---------------------------------------------------------------------------
multiprocessing:
  - spoken: "import multiprocessing"
    written: "import multiprocessing\n"
    space_before: true
    space_after: false

  - spoken: "process"
    written: "multiprocessing.Process(target={CURSOR}, daemon=True)"
    space_before: true
    space_after: false

  - spoken: "process pool"
    written: "ProcessPoolExecutor(max_workers={CURSOR})"
    space_before: true
    space_after: false

  - spoken: "pool map"
    written: "pool.map({CURSOR}, )"
    space_before: true
    space_after: false

  - spoken: "mp queue"
