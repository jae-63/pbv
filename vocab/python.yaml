    space_before: true
    space_after: false

  - spoken: "event flag"
    written: "threading.Event()"
    space_before: true
    space_after: false

  - spoken: "thread local"
    written: "threading.local()"
    space_before: true
    space_after: false

  - spoken: "thread pool"
    written: "ThreadPoolExecutor(max_workers={CURSOR})"
    space_before: true
    space_after: false

  - spoken: "submit"
    written: ".submit({CURSOR})"
    space_before: false
    space_after: false

  - spoken: "as completed"
