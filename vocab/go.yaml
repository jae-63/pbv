  - {spoken: "recover",          written: "recover",        space_before: true,  space_after: false}
  - {spoken: "make",             written: "make",           space_before: true,  space_after: false}
  - {spoken: "new",              written: "new",            space_before: true,  space_after: false}
  - {spoken: "append",           written: "append",         space_before: true,  space_after: false}
  - {spoken: "len",              written: "len",            space_before: true,  space_after: false}
