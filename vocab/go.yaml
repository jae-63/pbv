  - {spoken: "true",             written: "true",           space_before: true,  space_after: true}
  - {spoken: "false",            written: "false",          space_before: true,  space_after: true}
  - {spoken: "error",            written: "error",          space_before: true,  space_after: true}

operators:
  - {spoken: "short assign",         written: " := ",   space_before: false, space_after: false}
  - {spoken: "assign",               written: " = ",    space_before: false, space_after: false}
  - {spoken: "is equal to",          written: " == ",   space_before: false, space_after: false}
  - {spoken: "not equal to",         written: " != ",   space_before: false, space_after: false}
  - {spoken: "less than",            written: " < ",    space_before: false, space_after: false}
  - {spoken: "greater than",         written: " > ",    space_before: false, space_after: false}
  - {spoken: "less than or equal",   written: " <= ",   space_before: false, space_after: false}
  - {spoken: "greater than or equal",written: " >= ",   space_before: false, space_after: false}
  - {spoken: "plus equals",          written: " += ",   space_before: false, space_after: false}
  - {spoken: "minus equals",         written: " -= ",   space_before: false, space_after: false}
  - {spoken: "plus plus",            written: "++",     space_before: false, space_after: false}
  - {spoken: "minus minus",          written: "--",     space_before: false, space_after: false}
  - {spoken: "and",                  written: " && ",   space_before: false, space_after: false}
  - {spoken: "or",                   written: " || ",   space_before: false, space_after: false}
  - {spoken: "not",                  written: "!",      space_before: false, space_after: false}
  - {spoken: "arrow",                written: " -> ",   space_before: false, space_after: false}
  - {spoken: "send",                 written: " <- ",   space_before: false, space_after: false}
  - {spoken: "receive",              written: "<-",     space_before: false, space_after: false}
  - {spoken: "pointer",              written: "*",      space_before: false, space_after: false}
  - {spoken: "address of",           written: "&",      space_before: false, space_after: false}

types:
  - {spoken: "string",        written: "string",    space_before: true, space_after: true}
  - {spoken: "int",           written: "int",       space_before: true, space_after: true}
  - {spoken: "int 64",        written: "int64",     space_before: true, space_after: true}
  - {spoken: "int 32",        written: "int32",     space_before: true, space_after: true}
  - {spoken: "uint 64",       written: "uint64",    space_before: true, space_after: true}
  - {spoken: "float 64",      written: "float64",   space_before: true, space_after: true}
  - {spoken: "float 32",      written: "float32",   space_before: true, space_after: true}
  - {spoken: "bool",          written: "bool",      space_before: true, space_after: true}
  - {spoken: "byte",          written: "byte",      space_before: true, space_after: true}
  - {spoken: "rune",          written: "rune",      space_before: true, space_after: true}
  - {spoken: "any",           written: "any",       space_before: true, space_after: true}
  - {spoken: "interface any", written: "interface{}", space_before: true, space_after: true}

patterns:
  - spoken: "error check"
    written: "if err != nil {\n    return {CURSOR}err\n}"
    space_before: true
    space_after: false

  - spoken: "func signature"
    written: "func {CURSOR}() error {\n    "
    space_before: true
    space_after: false

  - spoken: "for range"
    written: "for {CURSOR}, v := range  {\n    "
    space_before: true
    space_after: false

  - spoken: "struct definition"
    written: "type {CURSOR} struct {\n    "
    space_before: true
    space_after: false

  - spoken: "interface definition"
    written: "type {CURSOR} interface {\n    "
    space_before: true
    space_after: false

  - spoken: "make slice"
    written: "make([]{CURSOR}, 0)"
    space_before: true
    space_after: false

  - spoken: "make map"
    written: "make(map[{CURSOR}])"
    space_before: true
    space_after: false

  - spoken: "go routine"
    written: "go func() {\n    {CURSOR}\n}()"
    space_before: true
    space_after: false

  - spoken: "fmt print line"
    written: "fmt.Println({CURSOR})"
    space_before: true
    space_after: false

  - spoken: "fmt printf"
    written: "fmt.Printf(\"{CURSOR}\")"
    space_before: true
    space_after: false

  - spoken: "fmt errorf"
    written: "fmt.Errorf(\"{CURSOR}\")"
    space_before: true
    space_after: false
