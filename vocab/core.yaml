# Core vocabulary — language-agnostic
# Schema:
#   spoken:        phrase the user says
#   written:       text inserted into the editor
#   space_before:  insert a space before written (default: true)
#   space_after:   insert a space after written (default: true)
#   category:      for documentation and tooling grouping
#
# Special written values:
#   \n            newline
#   \t            tab
#   {CURSOR}      cursor placement hint (used by extension)
#   {NOSPACE}     suppress the next auto-space

# ---------------------------------------------------------------------------
# Character names (NATO phonetic + common)
# space_before/after both false — these emit single characters inline
# ---------------------------------------------------------------------------
